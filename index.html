<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>拼多多推广数据匹配·出单率版 (修复)</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        }
        body {
            background: #f5f7fb;
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }
        .card {
            max-width: 960px;
            width: 100%;
            background: white;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0, 10, 30, 0.1);
            padding: 32px;
        }
        h1 {
            font-size: 1.8rem;
            font-weight: 600;
            margin: 0 0 8px 0;
            color: #1e293b;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .subtitle {
            color: #475569;
            margin-bottom: 32px;
            font-size: 0.95rem;
            border-left: 4px solid #a78bfa;
            padding-left: 16px;
            background: #f8fafc;
            border-radius: 0 12px 12px 0;
            line-height: 1.5;
        }
        .upload-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 24px;
            margin-bottom: 24px;
        }
        .upload-area {
            flex: 1 1 280px;
            background: #f9f9fc;
            border-radius: 20px;
            padding: 20px;
            border: 1px solid #e2e8f0;
            transition: 0.2s;
        }
        .upload-area:hover {
            border-color: #c7d2fe;
            background: #fefefe;
        }
        .upload-area label {
            font-weight: 600;
            font-size: 1rem;
            color: #334155;
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 12px;
        }
        .upload-area small {
            color: #64748b;
            font-size: 0.8rem;
            display: block;
            margin-top: 6px;
        }
        input[type="file"] {
            width: 100%;
            padding: 10px 0;
            font-size: 0.9rem;
            border: 1px dashed #94a3b8;
            border-radius: 14px;
            background: white;
            text-indent: 10px;
            cursor: pointer;
        }
        input[type="file"]::file-selector-button {
            background: #eef2ff;
            border: none;
            border-radius: 30px;
            padding: 8px 16px;
            font-weight: 500;
            color: #4f46e5;
            margin-right: 12px;
            cursor: pointer;
            transition: 0.15s;
            border: 1px solid #c7d2fe;
        }
        input[type="file"]::file-selector-button:hover {
            background: #dbeafe;
        }
        .sheet-selector {
            background: #f1f4f9;
            border-radius: 16px;
            padding: 16px 20px;
            margin: 20px 0 24px;
            border: 1px solid #d9e2ef;
        }
        .sheet-selector label {
            font-weight: 600;
            color: #1e293b;
            margin-right: 16px;
        }
        select {
            padding: 10px 16px;
            border-radius: 40px;
            border: 1px solid #cbd5e1;
            background: white;
            font-size: 0.95rem;
            min-width: 220px;
            cursor: pointer;
            outline: none;
            transition: 0.15s;
        }
        select:focus {
            border-color: #8b5cf6;
            box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.2);
        }
        .status-badge {
            display: inline-block;
            background: #e6f7e6;
            color: #0e6245;
            padding: 4px 14px;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 500;
            margin-left: 12px;
        }
        .btn-group {
            display: flex;
            gap: 16px;
            align-items: center;
            flex-wrap: wrap;
            margin-top: 28px;
        }
        .btn-primary {
            background: #4f46e5;
            color: white;
            border: none;
            padding: 14px 36px;
            border-radius: 60px;
            font-weight: 600;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.15s;
            box-shadow: 0 4px 10px rgba(79, 70, 229, 0.3);
            border: 1px solid #4f46e5;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .btn-primary:hover {
            background: #4338ca;
            transform: translateY(-2px);
            box-shadow: 0 12px 24px -8px #4f46e5;
        }
        .btn-primary:disabled {
            background: #a5b4fc;
            border-color: #a5b4fc;
            box-shadow: none;
            transform: none;
            cursor: not-allowed;
        }
        .download-link {
            background: #eef2ff;
            border-radius: 60px;
            padding: 12px 24px;
            color: #4f46e5;
            font-weight: 500;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            border: 1px solid #c7d2fe;
        }
        .footer-note {
            margin-top: 32px;
            font-size: 0.85rem;
            color: #626e7e;
            background: #f1f5f9;
            border-radius: 16px;
            padding: 12px 20px;
            border-left: 4px solid #8b5cf6;
        }
        .error-message {
            color: #b91c1c;
            background: #fee2e2;
            padding: 10px 18px;
            border-radius: 40px;
            font-size: 0.9rem;
        }
        .file-hint {
            font-size: 0.8rem;
            color: #475569;
            margin-top: 8px;
            background: #f1f5f9;
            padding: 6px 12px;
            border-radius: 30px;
        }
        .warning-badge {
            background: #fef3c7;
            color: #92400e;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            margin-left: 8px;
        }
    </style>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
</head>
<body>
    <div class="card">
        <h1>
            📊 商品维度匹配器 · 含出单率
            <span class="status-badge">修复版</span>
        </h1>
        <div class="subtitle">
            ✅ 智能名称清洗 ✅ 准确读取净成交笔数（排除占比/比例/率等派生列）<br>
            以“商品名称”为键，统计每个商品：最大净成交笔数 / 成交>0链接数 / 出单率
        </div>

        <div class="upload-grid">
            <div class="upload-area">
                <label>📎 拼多多推广数据报表</label>
                <input type="file" id="pddFile" accept=".xlsx, .xls, .csv, .xlsm">
                <div class="file-hint" id="pddHint">未选择文件</div>
                <small>需包含「商品名称」和「净成交笔数」列</small>
            </div>
            <div class="upload-area">
                <label>📎 相似品卡投产表</label>
                <input type="file" id="similarFile" accept=".xlsx, .xls, .csv, .xlsm">
                <div class="file-hint" id="similarHint">未选择文件</div>
                <small>需包含「商品名称」列，将在此表后追加三列</small>
            </div>
        </div>

        <div class="sheet-selector" id="sheetSelectorContainer" style="display: none;">
            <label>📑 选择工作表 (相似品卡投产表内的目标sheet):</label>
            <select id="sheetSelect"></select>
            <div style="margin-top: 8px; color:#4b5563; font-size:0.85rem;">工具将修改此sheet，其他sheet保持不变</div>
        </div>

        <div class="btn-group">
            <button class="btn-primary" id="processBtn" disabled>
                ⚡ 执行匹配 & 生成下载
            </button>
            <a id="downloadLink" style="display: none;" class="download-link">⬇️ 下载更新后的文件</a>
        </div>
        <div id="messageArea" style="margin-top: 20px;"></div>

        <div class="footer-note">
            💡 修复说明：<br>
            · 列匹配时精确排除“占比”、“比例”、“率”等，彻底避免误取小数<br>
            · 兼容全半角、空格差异；自动提取纯数字（去除单位、逗号）<br>
            · 未匹配商品会在结果中提示前5个，方便核对
        </div>
    </div>

    <script>
        (function() {
            // ---------- 核心工具函数 ----------
            function normalizeName(str) {
                if (str === null || str === undefined) return '';
                let s = String(str).trim();
                // 全角英数符号转半角
                s = s.replace(/[\uFF01-\uFF5E]/g, ch => String.fromCharCode(ch.charCodeAt(0) - 0xFEE0));
                // 全角空格转半角
                s = s.replace(/\u3000/g, ' ');
                // 去除所有空格
                s = s.replace(/\s+/g, '');
                return s.toLowerCase();
            }

            function parseSalesValue(val) {
                if (val === undefined || val === null) return null;
                let str = String(val).trim();
                if (str === '') return null;
                // 全角数字、点、负号转半角
                str = str.replace(/[\uFF10-\uFF19]/g, ch => String.fromCharCode(ch.charCodeAt(0) - 0xFEE0));
                str = str.replace(/\uFF0D/g, '-').replace(/\uFF0E/g, '.');
                let cleaned = str.replace(/[^0-9.\-]/g, '');
                if ((cleaned.match(/-/g) || []).length > 1) cleaned = cleaned.replace(/-/g, '');
                if (cleaned.indexOf('-') > 0) cleaned = cleaned.replace('-', '');
                if (cleaned === '' || cleaned === '.' || cleaned === '-') return null;
                let num = Number(cleaned);
                return isNaN(num) ? null : num;
            }

            // ---------- 全局变量 ----------
            let pddAggMap = new Map();
            let similarWorkbook = null;
            let targetSheetName = '';
            let similarSheetNames = [];

            const pddInput = document.getElementById('pddFile');
            const similarInput = document.getElementById('similarFile');
            const pddHint = document.getElementById('pddHint');
            const similarHint = document.getElementById('similarHint');
            const sheetSelectorContainer = document.getElementById('sheetSelectorContainer');
            const sheetSelect = document.getElementById('sheetSelect');
            const processBtn = document.getElementById('processBtn');
            const downloadLink = document.getElementById('downloadLink');
            const messageArea = document.getElementById('messageArea');

            function setMessage(text, isError = false) {
                messageArea.innerHTML = `<div class="${isError ? 'error-message' : ''}" style="padding:8px 0;">${text}</div>`;
            }

            function hideDownload() {
                downloadLink.style.display = 'none';
                downloadLink.removeAttribute('download');
                downloadLink.href = '#';
            }

            // ---------- 解析拼多多报表 ----------
            function processPddFile(workbook) {
                try {
                    const sheet = workbook.Sheets[workbook.SheetNames[0]];
                    const data = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: '' });
                    if (data.length < 2) throw new Error('报表内容不足两行');

                    const headers = data[0].map(h => (h || '').toString().trim());
                    let goodsColIdx = -1;
                    let salesColIdx = -1;

                    for (let i = 0; i < headers.length; i++) {
                        const col = normalizeName(headers[i]);

                        // 商品名称
                        if ((col.includes('商品名称') || col.includes('商品名')) && goodsColIdx === -1) {
                            goodsColIdx = i;
                        }

                        // 净成交笔数：必须包含关键词，且排除占比、比例、率等派生列
                        if ((col.includes('链接净成交笔数') || col.includes('净成交笔数')) &&
                            !col.includes('占比') &&
                            !col.includes('比例') &&
                            !col.includes('率')) {
                            salesColIdx = i;   // 若存在多列，取最后一列有效（如同时有“净成交笔数”和“链接净成交笔数”则取后者）
                        }
                    }

                    if (goodsColIdx === -1) throw new Error('未找到“商品名称”列');
                    if (salesColIdx === -1) throw new Error('未找到“净成交笔数”列（请检查是否被占比/比例列干扰）');

                    const agg = new Map();
                    let invalidRows = 0;

                    for (let r = 1; r < data.length; r++) {
                        const row = data[r];
                        if (!row || row.length === 0) continue;
                        const rawName = row[goodsColIdx];
                        if (!rawName || String(rawName).trim() === '') continue;
                        const normName = normalizeName(rawName);
                        const rawSales = row[salesColIdx];
                        const salesNum = parseSalesValue(rawSales);

                        if (!agg.has(normName)) {
                            agg.set(normName, { max: -Infinity, count: 0, totalCount: 0 });
                        }
                        const rec = agg.get(normName);
                        rec.totalCount += 1;
                        if (salesNum !== null) {
                            if (salesNum > rec.max) rec.max = salesNum;
                            if (salesNum > 0) rec.count += 1;
                        } else {
                            invalidRows++;
                        }
                    }

                    for (let [key, value] of agg.entries()) {
                        if (value.max === -Infinity) value.max = 0;
                    }

                    pddAggMap = agg;
                    let totalLinks = Array.from(agg.values()).reduce((s, v) => s + v.totalCount, 0);
                    let msg = `✅ 拼多多报表解析完成：${agg.size} 个商品，${totalLinks} 条链接`;
                    if (invalidRows > 0) msg += ` ⚠️ 其中 ${invalidRows} 行净成交笔数无效/为空`;
                    setMessage(msg);
                    return true;
                } catch (e) {
                    setMessage(`❌ ${e.message}`, true);
                    return false;
                }
            }

            // ---------- 解析相似品表sheet列表 ----------
            function loadSimilarSheets(workbook) {
                similarSheetNames = workbook.SheetNames;
                sheetSelect.innerHTML = '';
                similarSheetNames.forEach(name => {
                    const opt = document.createElement('option');
                    opt.value = name;
                    opt.textContent = name;
                    sheetSelect.appendChild(opt);
                });
                let idx = similarSheetNames.findIndex(n => n.includes('原链接分表') || n.includes('原链接'));
                if (idx === -1) idx = 0;
                sheetSelect.selectedIndex = idx;
                targetSheetName = similarSheetNames[idx];
                sheetSelectorContainer.style.display = 'block';
            }

            sheetSelect.addEventListener('change', () => {
                targetSheetName = sheetSelect.value;
                checkReady();
            });

            // ---------- 文件上传处理 ----------
            pddInput.addEventListener('change', async e => {
                const file = e.target.files[0];
                hideDownload();
                if (!file) { pddHint.innerText = '未选择文件'; pddAggMap.clear(); checkReady(); return; }
                pddHint.innerText = `📄 ${file.name} (加载中...)`;
                try {
                    const data = await file.arrayBuffer();
                    const wb = XLSX.read(data, { type: 'array' });
                    const ok = processPddFile(wb);
                    pddHint.innerText = ok ? `✅ ${file.name}` : `⚠️ ${file.name}`;
                } catch (err) {
                    setMessage(`读取拼多多文件异常: ${err.message}`, true);
                    pddHint.innerText = `❌ ${file.name}`;
                }
                checkReady();
            });

            similarInput.addEventListener('change', async e => {
                const file = e.target.files[0];
                hideDownload();
                if (!file) {
                    similarHint.innerText = '未选择文件';
                    similarWorkbook = null;
                    sheetSelectorContainer.style.display = 'none';
                    checkReady();
                    return;
                }
                similarHint.innerText = `📄 ${file.name} (加载中...)`;
                try {
                    const data = await file.arrayBuffer();
                    similarWorkbook = XLSX.read(data, { type: 'array' });
                    loadSimilarSheets(similarWorkbook);
                    similarHint.innerText = `✅ ${file.name} (${similarSheetNames.length} sheet)`;
                } catch (err) {
                    setMessage(`读取相似品文件异常: ${err.message}`, true);
                    similarHint.innerText = `❌ ${file.name}`;
                }
                checkReady();
            });

            function checkReady() {
                processBtn.disabled = !(pddAggMap.size > 0 && similarWorkbook && targetSheetName);
            }

            // ---------- 合并并下载 ----------
            function mergeAndDownload() {
                try {
                    const targetSheet = similarWorkbook.Sheets[targetSheetName];
                    const rows = XLSX.utils.sheet_to_json(targetSheet, { header: 1, defval: '' });
                    if (rows.length < 1) throw new Error('目标sheet无数据');

                    const headers = rows[0].map(h => (h || '').toString().trim());
                    let goodsColIdx = -1;
                    for (let i = 0; i < headers.length; i++) {
                        const col = normalizeName(headers[i]);
                        if (col.includes('商品名称') || col.includes('商品名')) {
                            goodsColIdx = i;
                            break;
                        }
                    }
                    if (goodsColIdx === -1) throw new Error('相似品表中未找到“商品名称”列');

                    const newHeaders = [...headers, '最大净成交笔数', '大于0的链接数', '出单率'];
                    const newRows = [newHeaders];
                    let matchCount = 0;
                    const noMatchList = [];

                    for (let r = 1; r < rows.length; r++) {
                        const row = rows[r];
                        const fullRow = new Array(headers.length).fill('');
                        for (let i = 0; i < headers.length; i++) {
                            fullRow[i] = (row && row[i] !== undefined && row[i] !== null) ? row[i] : '';
                        }
                        const normName = normalizeName(fullRow[goodsColIdx]);
                        let maxVal = 0, countVal = 0, rateVal = 0;
                        if (normName && pddAggMap.has(normName)) {
                            const rec = pddAggMap.get(normName);
                            maxVal = rec.max;
                            countVal = rec.count;
                            if (rec.totalCount > 0) {
                                rateVal = Math.round((rec.count / rec.totalCount) * 100) / 100;
                            }
                            matchCount++;
                        } else if (normName) {
                            noMatchList.push(fullRow[goodsColIdx].toString().trim());
                        }
                        newRows.push([...fullRow, maxVal, countVal, rateVal]);
                    }

                    // 构建新工作簿
                    const newSheet = XLSX.utils.aoa_to_sheet(newRows);
                    const newWb = XLSX.utils.book_new();
                    similarWorkbook.SheetNames.forEach(sn => {
                        XLSX.utils.book_append_sheet(newWb,
                            sn === targetSheetName ? newSheet : similarWorkbook.Sheets[sn], sn);
                    });

                    const fileName = '相似品卡投产表_更新_含出单率.xlsx';
                    XLSX.writeFile(newWb, fileName);
                    downloadLink.style.display = 'inline-flex';
                    let msg = `✅ 处理成功！已匹配 ${matchCount} 个商品，文件已下载。`;
                    if (noMatchList.length > 0) {
                        const uniq = [...new Set(noMatchList)];
                        msg += `<br>⚠️ 有 ${uniq.length} 个商品未匹配（已填0）：<span class="warning-badge">${uniq.slice(0,5).join('、')}${uniq.length>5?'…':''}</span>`;
                    }
                    setMessage(msg);
                } catch (err) {
                    setMessage(`❌ 合并失败: ${err.message}`, true);
                }
            }

            processBtn.addEventListener('click', mergeAndDownload);
        })();
    </script>
</body>
</html>
